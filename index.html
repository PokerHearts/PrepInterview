<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Prep Tool</title>
    <link rel="stylesheet" href="style.css">
    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Interview Prep Tool</h1>
            <p>Mock interviews powered by Gemini AI</p>
        </header>

        <!-- STEP 1: SETUP -->
        <section id="setup-view" class="view">
            <div class="card">
                <h2>Interview Configuration</h2>
                <div class="form-group">
                    <label for="api-key">Gemini API Key (BYOK)</label>
                    <input type="password" id="api-key" placeholder="Enter your Gemini API Key">
                    <small>Your key is stored only in your browser's session.</small>
                </div>
                <div class="form-group">
                    <label for="resume-upload">Upload Resume (PDF)</label>
                    <input type="file" id="resume-upload" accept=".pdf">
                </div>
                <div class="form-group">
                    <label for="job-description">Job Description / Target Role</label>
                    <textarea id="job-description" rows="5" placeholder="Paste the job description or enter the role (e.g., Frontend Engineer)"></textarea>
                </div>
                <div class="form-group">
                    <label>Preferred Language</label>
                    <select id="language-select">
                        <option value="en-IN">English (India)</option>
                        <option value="hi-IN">Hindi</option>
                        <option value="en-US">English (US)</option>
                        <option value="en-GB">English (UK)</option>
                    </select>
                </div>
                <button id="start-btn" class="primary-btn">Start Mock Interview</button>
            </div>
        </section>

        <!-- STEP 2: INTERVIEW -->
        <section id="interview-view" class="view hidden">
            <div class="interview-container">
                <div class="transcript-panel">
                    <div id="transcript-messages"></div>
                    <div id="interim-container">
                        <p id="interim-text"></p>
                    </div>
                </div>
                
                <div class="controls-panel">
                    <div class="status-indicator">
                        <span id="state-badge" class="badge">Initializing...</span>
                        <div id="visualizer-container">
                            <div id="visualizer-bar"></div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <div class="toggle-group">
                            <label class="switch">
                                <input type="checkbox" id="bargein-toggle" checked>
                                <span class="slider round"></span>
                            </label>
                            <span>Allow Interruption (Barge-in)</span>
                        </div>
                        <button id="end-btn" class="danger-btn">End Interview</button>
                    </div>

                    <div class="manual-input">
                        <input type="text" id="text-input-box" placeholder="Type your answer instead...">
                        <button id="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- STEP 3: SCORECARD -->
        <section id="scorecard-view" class="view hidden">
            <div class="card">
                <h2>Interview Scorecard</h2>
                <div id="scorecard-content" class="markdown-body">
                    <p>Generating your performance report...</p>
                </div>
                <div class="scorecard-actions">
                    <button id="download-btn" class="primary-btn">Download Report</button>
                    <button id="restart-btn" class="secondary-btn">New Interview</button>
                </div>
            </div>
        </section>

        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
            <p id="loading-text">Processing...</p>
        </div>
    </div>

    <script src="voice-engine.js"></script>
    <script src="pdf-helper.js"></script>
    <script src="app.js"></script>
</body>
</html>
